<!DOCTYPE html>

<head>

<body>
  <header>
    <div class="container">
      <h1 class="logo">ZodsTech</h1>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>

  <section class="hero small-hero">
    <div class="container">
      <h2>Contact Us</h2>
      <p>We’re here to help and answer your queries.</p>
    </div>
  </section>

  <section class="contact-form">
    <div class="container">
     <form action="https://formsubmit.co/chukwunonsoozodi@gmail.com" method="POST">
  <input type="hidden" name="_captcha" value="false">
  <input type="hidden" name="_template" value="table">
  <input type="hidden" name="_next" value="https://yourdomain.com/thankyou.html">
  
  <label for="name">Full Name:</label>
  <input type="text" name="name" id="name"
  placeholder="Enter your name here"
  required>
  
  <label for="email">Email Address:</label>
  <input type="email" name="email" id="email"
  placeholder="Enter your Email here"
  required>
  
  <label for="subject">Subject:</label>
  <input type="text" name="subject" id="subject"
  placeholder="Enter your Caption here"
  required>
  
  <label for="message">Your Message:</label>
  <textarea name="message" id="message" rows="5" 
  placeholder="Enter your message description here"
  required></textarea>
  
  <button type="submit">Send Message</button>
</form>

    </div>
  </section>

  <section class="contact-info">
    <div class="container">
      <h3>Get in Touch</h3>
      <p><strong>Address:</strong> Plot 10, Tech Valley, Lagos, Nigeria</p>
      <p><strong>Email:</strong> contact@zodstech.com</p>
      <p><strong>Phone:</strong> +234-816-383-5054</p>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2025 ZodsTech Global Limited. All rights reserved.</p>
    </div>

<a href="https://wa.me/2348163835053" class="whatsapp-float" target="_blank" title="Chat with us">

</a>

<style>
  .whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 999;
  }
  .whatsapp-float img {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: transform 0.3s;
  }
  .whatsapp-float img:hover {
    transform: scale(1.1);
  }
</style>
